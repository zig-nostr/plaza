name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # The Plaza app (Native SDK): macOS only, via the native CLI.
  app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Zig version
        id: zig-version
        run: echo "version=$(cat .zigversion)" >> "$GITHUB_OUTPUT"

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ steps.zig-version.outputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install the Native SDK CLI
        run: npm install -g @native-sdk/cli@0.4.4

      - name: Check markup and manifest
        run: native check

      - name: Test
        run: native test

      - name: Build
        run: native build

      - name: Check formatting
        run: zig fmt --check src
