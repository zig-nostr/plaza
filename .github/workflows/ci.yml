name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # The full check on the platform Plaza ships from today.
  app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Zig version
        id: zig-version
        run: echo "version=$(cat .zigversion)" >> "$GITHUB_OUTPUT"

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ steps.zig-version.outputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install the Native SDK CLI
        run: npm install -g @native-sdk/cli@0.4.4

      - name: Check markup and manifest
        run: native check

      - name: Test
        run: native test

      - name: Build
        run: native build

      - name: Check formatting
        run: zig fmt --check src

  # Linux and Windows build the whole stack (the library with its vendored
  # secp256k1 and LMDB, the stb codecs, and the app) and run the test suite, so
  # a portability break surfaces on the PR that causes it rather than months
  # later. Packaged releases for these platforms come later: the toolkit
  # renders through a software rasteriser off macOS today, so shipping one now
  # would misrepresent how Plaza performs.
  portability:
    name: portability (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Read Zig version
        id: zig-version
        shell: bash
        run: echo "version=$(cat .zigversion)" >> "$GITHUB_OUTPUT"

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ steps.zig-version.outputs.version }}

      # The Linux host binds GTK4 and WebKitGTK; without the dev packages the
      # link fails on the host layer rather than on anything of ours.
      - name: Install Linux host dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Build
        run: zig build

      - name: Test
        run: zig build test

      - name: Check formatting
        shell: bash
        run: zig fmt --check src
